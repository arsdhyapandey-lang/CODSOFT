<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecSysAP - Premium Recommendations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        /* Background animated blobs */
        .background-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .results-container {
            min-height: 100px;
        }

        .result-item {
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: 300;
            animation: slideUp 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .result-item:nth-child(1) { animation-delay: 0.1s; }
        .result-item:nth-child(2) { animation-delay: 0.2s; }
        .result-item:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-text {
            color: #ef4444;
            font-size: 0.9rem;
            animation: slideUp 0.3s ease;
        }

        .loading-text {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    
    <div class="container">
        <header>
            <h1>Rec<span>Sys</span></h1>
            <p>Discover your next favorite movie</p>
        </header>

        <main>
            <section class="card content-card">
                <h2>Content-Based</h2>
                <p>Find similar movies based on what you already love.</p>
                <div class="input-group">
                    <input type="text" id="movie-input" placeholder="e.g., The Matrix" />
                    <button onclick="getRecommendations('content')">Search</button>
                </div>
                <div id="content-results" class="results-container"></div>
            </section>

            <section class="card collab-card">
                <h2>Collaborative</h2>
                <p>See what users with similar tastes are watching.</p>
                <div class="input-group">
                    <input type="number" id="user-input" placeholder="User ID (e.g., 3)" min="1" max="5"/>
                    <button onclick="getRecommendations('collaborative')">Search</button>
                </div>
                <div id="collab-results" class="results-container"></div>
            </section>
        </main>
    </div>

    <script>
        async function getRecommendations(type) {
            const resultsContainer = document.getElementById(type === 'content' ? 'content-results' : 'collab-results');
            const inputField = document.getElementById(type === 'content' ? 'movie-input' : 'user-input');
            const query = inputField.value.trim();

            if (!query) {
                resultsContainer.innerHTML = '<div class="error-text">Please enter a valid search query.</div>';
                return;
            }

            resultsContainer.innerHTML = '<div class="loading-text">Fetching recommendations...</div>';

            let url = '';
            if (type === 'content') {
                url = `/api/recommend/content?movie=${encodeURIComponent(query)}`;
            } else {
                url = `/api/recommend/collaborative?user_id=${encodeURIComponent(query)}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    resultsContainer.innerHTML = `<div class="error-text">${data.error || 'An error occurred.'}</div>`;
                    return;
                }

                if (data.recommendations && data.recommendations.length > 0) {
                    resultsContainer.innerHTML = data.recommendations.map(movie => 
                        `<div class="result-item">${movie}</div>`
                    ).join('');
                } else {
                    resultsContainer.innerHTML = '<div class="loading-text">No recommendations found.</div>';
                }
                
            } catch (error) {
                resultsContainer.innerHTML = '<div class="error-text">Failed to connect to the server.</div>';
            }
        }

        // Allow Enter key to trigger search
        document.getElementById('movie-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getRecommendations('content');
        });
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getRecommendations('collaborative');
        });
    </script>
</body>
</html>
